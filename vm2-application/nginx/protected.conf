server {
    listen 3001;
    server_name _;
    
    location / {
        # Call OPA for authorization
        auth_request /_opa_check;
        
        root /var/www/protected;
        index index.html;
        try_files $uri $uri/ =404;
    }
    
    location = /_opa_check {
        internal;
        
        proxy_method POST;
        proxy_pass http://192.168.1.101:8181/v1/data/httpauthz/allow;
        proxy_set_header Content-Type application/json;
        
        # Build the OPA request
        proxy_set_body '{
          "input": {
            "method": "$request_method",
            "headers": {
              "Authorization": "$http_authorization"
            },
            "source_ip": "$remote_addr"
          }
        }';
        
        # If OPA returns empty or false, deny
        proxy_intercept_errors on;
        error_page 404 = @deny;
    }
   
    location @deny {
        return 403 "403 Forbidden - Denied by Zero Trust Policy\n";
    }
}


