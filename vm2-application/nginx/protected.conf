map $http_authorization $auth_header_present {
    default 0;
    "~Bearer .+" 1;
}

server {
    listen 3001;
    server_name _;

    location / {
        # Require Authorization header
        if ($auth_header_present = 0) {
            return 403 "403 Forbidden - Missing authentication toke>
        }

        # If header present, check with OPA
        auth_request /_opa_check;

        # If OPA check fails (non-2xx), deny
        auth_request_set $opa_status $upstream_status;

        # This shouldn't happen if OPA is up, but just in case
        if ($opa_status = 503) {
            return 503 "Service Unavailable - Policy engine error\n>
        }

        root /var/www/protected;
        index index.html;
        try_files $uri $uri/ =404;
    }

    location = /_opa_check {
        internal;

        proxy_pass http://192.168.1.101:8181/v1/data/httpauthz/allo>
        proxy_method POST;
        proxy_set_header Content-Type application/json;

        # Pass request details to OPA
        proxy_set_body '{"input":{"method":"$request_method","heade>

        # Don't intercept errors - let auth_request handle them
        proxy_intercept_errors off;

        # Short timeouts
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }
}


